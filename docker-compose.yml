# kmerfrеt/docker-compose.yml
services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: kmerfret_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kmerfret
      POSTGRES_USER: kmerfret
      POSTGRES_PASSWORD: kmerfret2024
    ports:
      - "5433:5432"
    volumes:
      - kmerfret_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kmerfret_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmerfret -d kmerfret"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kmerfret_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kmerfret.cm
      PGADMIN_DEFAULT_PASSWORD: admin2024
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - kmerfret_network

volumes:
  kmerfret_pgdata:

networks:
  kmerfret_network:
    driver: bridge
